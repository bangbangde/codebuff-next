name: codebuff-local

services:
  postgres:
    image: postgres:18.4-alpine
    container_name: codebuff-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-codebuff}
      POSTGRES_PASSWORD: ${PG_PWD:-codebuff}
      POSTGRES_DB: ${PG_DB:-codebuff_next}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 30

  garage:
    image: dxflrs/garage:v1.0.1
    container_name: codebuff-local-garage
    restart: unless-stopped
    command: ["server"]
    ports:
      - "127.0.0.1:${GARAGE_S3_PORT:-3900}:3900"
      - "127.0.0.1:${GARAGE_RPC_PORT:-3901}:3901"
      - "127.0.0.1:${GARAGE_WEB_PORT:-3902}:3902"
    volumes:
      - garage_data:/var/lib/garage
      - ./garage.toml:/etc/garage.toml:ro
    environment:
      GARAGE_CONFIG_FILE: /etc/garage.toml

  garage-init:
    image: dxflrs/garage:v1.0.1
    container_name: codebuff-local-garage-init
    depends_on:
      - garage
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
    environment:
      GARAGE_CONFIG_FILE: /etc/garage.toml
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for i in $(seq 1 30); do
          if garage node id >/dev/null 2>&1; then
            break
          fi
          sleep 1
        done
        NODE_ID=$$(garage node id)
        if ! garage layout show 2>/dev/null | grep -q "$$NODE_ID"; then
          garage layout assign "$$NODE_ID" -z zone1 -c 1G -t 1G
          garage layout apply --version 1
        fi
        garage key info local-dev-key >/dev/null 2>&1 || garage key create local-dev-key
        garage bucket info codebuff-local >/dev/null 2>&1 || garage bucket create codebuff-local
        garage bucket allow codebuff-local --read --write --key local-dev-key || true

  app:
    image: node:22-alpine
    container_name: codebuff-local-app
    working_dir: /app
    command:
      - "sh"
      - "-c"
      - "corepack prepare pnpm@10.33.0 --activate && pnpm install --frozen-lockfile && HOSTNAME=0.0.0.0 pnpm dev"
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-codebuff}
      PG_PWD: ${PG_PWD:-codebuff}
      PG_DB: ${PG_DB:-codebuff_next}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRETS: ${BETTER_AUTH_SECRETS:-dev-local-secret-that-must-be-at-least-32-characters-long-for-better-auth}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - app
    tty: true
    stdin_open: true
    restart: no

volumes:
  postgres_data:
  garage_data:
  node_modules:
