name: codebuff-local

services:
  postgres:
    image: postgres:18.4-alpine
    container_name: codebuff-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-codebuff}
      POSTGRES_PASSWORD: ${PG_PWD:-codebuff}
      POSTGRES_DB: ${PG_DB:-codebuff_next}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  garage:
    image: dxflrs/garage:v1.0.1
    container_name: codebuff-local-garage
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GARAGE_S3_PORT:-3900}:3900"
      - "127.0.0.1:${GARAGE_RPC_PORT:-3901}:3901"
      - "127.0.0.1:${GARAGE_WEB_PORT:-3902}:3902"
    volumes:
      - garage_data:/var/lib/garage
      - garage_config:/etc/garage
    environment:
      GARAGE_CONFIG_FILE: /etc/garage/garage.toml
    entrypoint: ["/garage", "server"]
    depends_on:
      init:
        condition: service_healthy

  app:
    image: node:22-alpine
    container_name: codebuff-local-app
    working_dir: /app
    command:
      - "sh"
      - "-c"
      - "corepack prepare pnpm@10.33.0 --activate && pnpm install --frozen-lockfile && HOSTNAME=0.0.0.0 pnpm dev"
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-codebuff}
      PG_PWD: ${PG_PWD:-codebuff}
      PG_DB: ${PG_DB:-codebuff_next}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRETS: ${BETTER_AUTH_SECRETS:-dev-local-secret-that-must-be-at-least-32-characters-long-for-better-auth}
    profiles:
      - app
    tty: true
    stdin_open: true
    restart: no

  init:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: codebuff-local-init
    working_dir: /app
    volumes:
      - garage_config:/etc/garage
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${PG_USER:-codebuff}
      POSTGRES_PASSWORD: ${PG_PWD:-codebuff}
      POSTGRES_DB: ${PG_DB:-codebuff_next}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-codebuff}
      PG_PWD: ${PG_PWD:-codebuff}
      PG_DB: ${PG_DB:-codebuff_next}
      AUTH_BOOTSTRAP_NAME: ${AUTH_BOOTSTRAP_NAME:-Codebuff Admin}
      AUTH_BOOTSTRAP_EMAIL: ${AUTH_BOOTSTRAP_EMAIL:-admin@codebuff.local}
      AUTH_BOOTSTRAP_PASSWORD: ${AUTH_BOOTSTRAP_PASSWORD:-Local-Dev-Bootstrap-Password}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRETS:-dev-local-secret-that-must-be-at-least-32-characters-long-for-better-auth}
      BETTER_AUTH_SECRETS: ${BETTER_AUTH_SECRETS:-dev-local-secret-that-must-be-at-least-32-characters-long-for-better-auth}
    healthcheck:
      test: ["CMD", "cat", "/etc/garage/garage.toml"]
      interval: 1s
      timeout: 5s
      retries: 30
    depends_on:
      - postgres

volumes:
  postgres_data:
  garage_data:
  garage_config:
  node_modules:
