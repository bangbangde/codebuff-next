name: CI and Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/codebuff-next

jobs:
  verify:
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4-bookworm@sha256:1961f96e6029a02c3812d7cb329a3b03a3ac2bb067058dec17b0f5596aca9296
        env:
          POSTGRES_PASSWORD: codebuff-ci-${{ github.run_id }}-${{ github.run_attempt }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4.4.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated database artifacts
        run: |
          pnpm auth:schema
          pnpm db:generate
          git diff --exit-code -- lib/db/schema.ts drizzle
          test -z "$(git status --porcelain --untracked-files=all -- lib/db/schema.ts drizzle)"

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Verify PostgreSQL migrations and role boundaries
        env:
          PG_ADMIN_HOST: 127.0.0.1
          PG_ADMIN_PORT: 5432
          PG_ADMIN_USER: postgres
          PG_ADMIN_PWD: codebuff-ci-${{ github.run_id }}-${{ github.run_attempt }}
        run: pnpm db:verify

      - name: Build verification image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker build --tag codebuff-next:verify .

      - name: Verify application image without database credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          container_id="$(docker run --detach --publish 3000:3000 codebuff-next:verify)"
          trap 'docker rm --force "$container_id" >/dev/null 2>&1 || true' EXIT

          for attempt in {1..20}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/ >/dev/null; then
              curl --fail --silent --show-error http://127.0.0.1:3000/me >/dev/null
              curl --fail --silent --show-error http://127.0.0.1:3000/notes >/dev/null
              exit 0
            fi
            sleep 1
          done

          docker logs "$container_id"
          exit 1

      - name: Verify migration entrypoint in image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PG_ADMIN_HOST: 127.0.0.1
          PG_ADMIN_PORT: 5432
          PG_ADMIN_USER: postgres
          PG_ADMIN_PWD: codebuff-ci-${{ github.run_id }}-${{ github.run_attempt }}
        run: pnpm db:verify -- --image codebuff-next:verify

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger infrastructure deployment
        # v4.0.1
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: bangbangde/my-cloud-infra
          event-type: app-update
          client-payload: >-
            {"service":"codebuff-next","image_tag":"sha-${{ github.sha }}"}
