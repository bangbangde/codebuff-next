name: Build and Push

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/codebuff-next

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify deployment
        env:
          TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          IMAGE_TAG: ${{ steps.meta.outputs.tags }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "INFRA_DISPATCH_TOKEN not set, skipping deployment notification"
            exit 0
          fi
          curl -s -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository_owner }}/my-cloud-infra/dispatches \
            -d '{
              "event_type": "app-update",
              "client_payload": {
                "service": "codebuff-next",
                "image_tag": "'"$(echo "$IMAGE_TAG" | head -n1)"'",
                "commit_sha": "'"${{ github.sha }}"'"
              }
            }'
